<head>

<title>In Villa · Menù</title>

<style>
  :root{
    --ink:#0B2545;
    --ink-deep:#081C38;
    --bronze:#9C7A3C;
    --bronze-light:#C9AE7C;
    --paper:#FFFDF9;
    --paper-2:#F3EEE1;
    --text:#2A2A2A;
    --muted:#746B5D;
    --line:rgba(11,37,69,.14);
    --shadow:0 8px 24px rgba(11,37,69,.08);
    --grain:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/></svg>");
    --paper-bg: var(--paper);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;width:100%;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  body{
    background:var(--paper);
    color:var(--text);
    font-family:'Lora',serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    min-height:100dvh;
  }
  .app{max-width:640px;margin:0 auto;min-height:100vh;min-height:100dvh;background:transparent;width:100%;}

  /* ---------- Header: copertina blu inchiostro ---------- */
  header.hero{
    position:relative;
    padding:54px 24px 46px;
    text-align:center;
    background:
      radial-gradient(ellipse 640px 380px at 50% 0%, rgba(201,174,124,.16), transparent 65%),
      var(--grain),
      linear-gradient(160deg, var(--ink) 0%, var(--ink-deep) 100%);
    overflow:hidden;
  }
  header.hero::before{
    content:"";
    position:absolute;
    top:14px; left:14px; right:14px; bottom:24px;
    border:1px solid rgba(201,174,124,.45);
    pointer-events:none;
  }
  .corner-vein{
    position:absolute;
    width:46px;
    height:46px;
    color:rgba(201,174,124,.55);
    pointer-events:none;
  }
  .corner-vein.tl{top:14px; left:14px;}
  .corner-vein.tr{top:14px; right:14px; transform:scaleX(-1);}
  .corner-vein.bl{bottom:24px; left:14px; transform:scaleY(-1);}
  .corner-vein.br{bottom:24px; right:14px; transform:scale(-1,-1);}
  header.hero::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:14px;
    background:linear-gradient(to bottom, transparent, var(--paper));
    pointer-events:none;
  }
  .eyebrow{
    font-family:'Inter',sans-serif;
    font-size:11px;
    letter-spacing:.28em;
    color:var(--bronze-light);
    text-transform:uppercase;
  }
  h1.brand{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:clamp(38px,11vw,52px);
    letter-spacing:.03em;
    color:#FBF8F1;
    margin:8px 0 6px;
  }
  .ornament{color:var(--bronze-light);font-size:15px;letter-spacing:.5em;margin:0 0 8px;}
  .tagline{
    font-family:'Lora',serif;
    font-style:italic;
    color:rgba(251,248,241,.72);
    font-size:14.5px;
    margin:0;
  }

  /* ---------- Ricerca (scorre via normalmente) ---------- */
  .search-wrap{
    padding:14px 20px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  .search-box{
    display:flex;align-items:center;gap:10px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:999px;
    padding:12px 16px;
  }
  .search-box svg{flex:none;color:var(--muted);}
  .search-box input{
    border:none;outline:none;background:transparent;
    font-family:'Inter',sans-serif;
    font-size:16px;
    color:var(--text);
    width:100%;
  }
  .search-box input::placeholder{color:#A79E8E;}

  /* ---------- Category nav (resta fissa in alto) ---------- */
  nav.cats{
    position:sticky;
    top:0;
    z-index:5;
    background:var(--paper-bg);
    border-bottom:1px solid var(--line);
    padding:10px 0;
  }
  .cats-scroll{
    display:flex;gap:8px;
    overflow-x:auto;
    padding:0 16px;
    scrollbar-width:none;
  }
  .cats-scroll::-webkit-scrollbar{display:none;}
  .cat-pill{
    flex:none;
    display:flex;
    align-items:center;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    letter-spacing:.02em;
    color:var(--ink);
    background:var(--paper-2);
    border:1px solid transparent;
    padding:11px 16px;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
    min-height:40px;
    transition:background .18s, color .18s, border-color .18s;
  }
  .cat-pill.active{
    background:var(--ink);
    color:#fff;
  }
  .cat-pill-icon{
    width:16px;height:16px;
    flex:none;margin-right:7px;
  }

  /* ---------- Sections ---------- */
  main{padding:6px 20px 40px;}
  section.cat{
    padding-top:28px;
    scroll-margin-top:var(--sticky-h, 112px);
  }
  .cat-head{
    margin-bottom:16px;
  }
  .cat-head h2{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:225px;
    max-width:100%;
    text-align:center;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:#fff;
    margin:0;
    padding:8px 14px;
    border-radius:999px;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
    box-sizing:border-box;
  }
  .cat-icon{
    width:18px;
    height:18px;
    flex:none;
    color:#fff;
  }

  .item{padding:12px 0 12px 14px;border-bottom:1px dotted var(--line);border-left:3px solid transparent;}
  .item:last-child{border-bottom:none;}
  .item-row{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .item-name{
    font-family:'Lora',serif;
    font-weight:600;
    font-size:16px;
    color:var(--text);
  }
  .leader{flex:1;border-bottom:1px dotted #C9BEA6;position:relative;top:-3px;min-width:12px;}
  .item-price{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:15px;
    color:var(--item-price-color, var(--bronze));
    white-space:nowrap;
  }
  .item-desc{
    font-family:'Lora',serif;
    font-style:italic;
    font-size:13.5px;
    color:var(--muted);
    margin-top:2px;
  }
  .cat-note{
    font-family:'Inter',sans-serif;
    font-size:12px;
    color:var(--muted);
    margin-top:10px;
    padding:10px 12px;
    background:var(--paper-2);
    border-radius:10px;
    border-left:3px solid var(--muted);
  }

  .no-results{
    display:none;
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-family:'Lora',serif;
    font-style:italic;
  }

  footer{
    position:relative;
    text-align:center;
    padding:44px 24px 40px;
    margin-top:16px;
    background:
      radial-gradient(ellipse 640px 320px at 50% 100%, rgba(201,174,124,.14), transparent 65%),
      var(--grain),
      linear-gradient(20deg, var(--ink) 0%, var(--ink-deep) 100%);
    overflow:hidden;
  }
  footer::before{
    content:"";
    position:absolute;
    left:0;right:0;top:0;
    height:14px;
    background:linear-gradient(to top, transparent, var(--paper));
    pointer-events:none;
  }
  footer .frame-box{
    position:absolute;
    top:24px; left:14px; right:14px; bottom:14px;
    border:1px solid rgba(201,174,124,.45);
    pointer-events:none;
  }
  footer .ornament{margin-bottom:14px;color:var(--bronze-light);}
  footer .contact{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14.5px;
    color:#FBF8F1;
    text-decoration:none;
    display:inline-block;
  }
  footer .contact:visited{ color:#FBF8F1; }
  footer .sub{
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    color:rgba(251,248,241,.6);
    margin-top:6px;
    letter-spacing:.03em;
  }

  @media (prefers-reduced-motion:no-preference){
    html{scroll-behavior:smooth;}
  }
</style>
</head>

const main = document.getElementById('main');
const catNav = document.getElementById('catNav');
const noResults = document.getElementById('noResults');

function syncStickyOffset(){
  const h = document.querySelector('nav.cats').offsetHeight;
  document.documentElement.style.setProperty('--sticky-h', h + 'px');
}
window.addEventListener('load', syncStickyOffset);
window.addEventListener('resize', syncStickyOffset);

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

DATA.forEach(cat => {
  const pill = document.createElement('button');
  pill.className = 'cat-pill';
  const navIconSvg = ICONS[cat.id] ? `<svg class="cat-pill-icon" viewBox="0 0 32 32" fill="currentColor" style="color:${cat.color}">${ICONS[cat.id]}</svg>` : '';
  pill.innerHTML = `${navIconSvg}${escapeHtml(cat.title)}`;
  pill.dataset.target = cat.id;
  pill.addEventListener('click', () => {
    document.getElementById('sec-' + cat.id).scrollIntoView({behavior:'smooth', block:'start'});
  });
  catNav.appendChild(pill);

  const sec = document.createElement('section');
  sec.className = 'cat';
  sec.id = 'sec-' + cat.id;

  const head = document.createElement('div');
  head.className = 'cat-head';
  const iconSvg = ICONS[cat.id] ? `<svg class="cat-icon" viewBox="0 0 32 32" fill="currentColor">${ICONS[cat.id]}</svg>` : '';

  sec.appendChild(head);

  cat.items.forEach(([name, desc, price]) => {
    const item = document.createElement('div');
    item.className = 'item';
    item.style.borderLeftColor = cat.color + '55';
    item.dataset.search = (name + ' ' + desc).toLowerCase();
    item.innerHTML = `
      <div class="item-row">
        <span class="item-name">${escapeHtml(name)}</span>
        <span class="leader"></span>
        <span class="item-price" style="--item-price-color:${cat.color}">${price} &euro;</span>
      </div>
      ${desc ? `<div class="item-desc">${escapeHtml(desc)}</div>` : ''}
    `;
    sec.appendChild(item);
  });

  if (cat.note){
    const note = document.createElement('div');
    note.className = 'cat-note';
    note.style.borderLeftColor = cat.color;
    note.textContent = cat.note;
    sec.appendChild(note);
  }

  main.appendChild(sec);
});

const pills = Array.from(document.querySelectorAll('.cat-pill'));
const sections = Array.from(document.querySelectorAll('section.cat'));
const catsScroll = document.getElementById('catNav');

function revealActivePill(pill){
  if (!pill) return;
  const scrollerRect = catsScroll.getBoundingClientRect();
  const pillRect = pill.getBoundingClientRect();
  // margine ai lati così la pillola non resta appiccicata al bordo
  const margin = 24;
  if (pillRect.left < scrollerRect.left + margin || pillRect.right > scrollerRect.right - margin) {
    const target = catsScroll.scrollLeft + (pillRect.left - scrollerRect.left) - margin;
    catsScroll.scrollTo({ left: target, behavior: 'smooth' });
  }
}

// Scrollspy
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting){
      const id = entry.target.id.replace('sec-','');
      pills.forEach(p => p.classList.toggle('active', p.dataset.target === id));
      const activePill = pills.find(p => p.dataset.target === id);
      revealActivePill(activePill);
    }
  });
}, { rootMargin: '-120px 0px -70% 0px', threshold: 0 });
sections.forEach(s => observer.observe(s));
if (pills[0]) pills[0].classList.add('active');

syncStickyOffset();
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(syncStickyOffset);
}

// Search
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let anyVisible = false;
  sections.forEach(sec => {
    let sectionHasMatch = false;
    sec.querySelectorAll('.item').forEach(item => {
      const match = !q || item.dataset.search.includes(q);
      item.style.display = match ? '' : 'none';
      if (match) sectionHasMatch = true;
    });
    sec.style.display = sectionHasMatch ? '' : 'none';
    if (sectionHasMatch) anyVisible = true;
  });
  noResults.style.display = anyVisible ? 'none' : 'block';
  document.querySelector('nav.cats').style.display = q ? 'none' : '';
});
</script>
